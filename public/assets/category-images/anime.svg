<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="54" y1="38" x2="462" y2="468" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="0.45" stop-color="#DB2777"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>

    <linearGradient id="hair" x1="148" y1="92" x2="374" y2="272" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>

    <linearGradient id="eye" x1="174" y1="250" x2="338" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="92" fill="#F8EFFF"/>
  <rect x="28" y="28" width="456" height="456" rx="78" fill="url(#bg)"/>

  <circle cx="108" cy="112" r="52" fill="white" opacity="0.14"/>
  <circle cx="414" cy="116" r="38" fill="#FDE68A" opacity="0.25"/>
  <circle cx="416" cy="404" r="86" fill="white" opacity="0.10"/>

  <path d="M78 384c42-62 99-90 178-90s136 28 178 90"
        fill="none" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.18"/>

  <g filter="url(#shadow)">
    <!-- face -->
    <path d="M154 250c0-82 42-138 102-138s102 56 102 138c0 84-45 144-102 144s-102-60-102-144z"
          fill="#FFE4D6"/>

    <!-- hair -->
    <path d="M146 246c-8-78 36-150 110-150 76 0 122 70 112 150
             -24-34-42-66-46-100-20 38-54 60-102 72
             8-18 12-38 10-58-20 42-50 70-84 86z"
          fill="url(#hair)"/>

    <path d="M164 210c-28 18-40 48-36 84 20-8 34-25 40-50"
          fill="#111827"/>
    <path d="M348 210c28 18 40 48 36 84-20-8-34-25-40-50"
          fill="#111827"/>

    <!-- ears -->
    <ellipse cx="150" cy="270" rx="18" ry="30" fill="#FFD7C2"/>
    <ellipse cx="362" cy="270" rx="18" ry="30" fill="#FFD7C2"/>

    <!-- eyes -->
    <ellipse cx="218" cy="270" rx="34" ry="42" fill="white"/>
    <ellipse cx="294" cy="270" rx="34" ry="42" fill="white"/>

    <circle cx="218" cy="274" r="22" fill="url(#eye)"/>
    <circle cx="294" cy="274" r="22" fill="url(#eye)"/>

    <circle cx="210" cy="262" r="8" fill="white"/>
    <circle cx="286" cy="262" r="8" fill="white"/>

    <circle cx="218" cy="278" r="10" fill="#0F172A"/>
    <circle cx="294" cy="278" r="10" fill="#0F172A"/>

    <!-- eyebrows -->
    <path d="M184 226c22-14 44-14 66-2" stroke="#111827" stroke-width="10" stroke-linecap="round"/>
    <path d="M262 224c22-12 44-12 66 2" stroke="#111827" stroke-width="10" stroke-linecap="round"/>

    <!-- nose and smile -->
    <path d="M256 286c-5 14-4 24 6 30" stroke="#E11D48" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.55"/>
    <path d="M226 334c18 22 42 22 60 0" stroke="#BE123C" stroke-width="8" stroke-linecap="round" fill="none"/>

    <!-- clothes -->
    <path d="M150 420c12-52 54-82 106-82s94 30 106 82H150z" fill="#1E1B4B"/>
    <path d="M218 350l38 52 38-52" fill="#F8FAFC"/>
    <path d="M236 382h40l-12 42h-16z" fill="#EF4444"/>

    <!-- spark -->
    <path d="M388 188l12 28 28 12-28 12-12 28-12-28-28-12 28-12z" fill="#FDE047"/>
    <path d="M120 174l8 18 18 8-18 8-8 18-8-18-18-8 18-8z" fill="#93C5FD"/>
  </g>
</svg>
